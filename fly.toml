primary_region = "lhr"

[[mounts]]
  source = "hermes_data"
  destination = "/data"
  initial_size = "10gb"

[http_service]
  internal_port = 4096
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[env]
  HOSTNAME = "hermes.codex"

[[vm]]
  size = "shared-cpu-4x"
  memory = "6gb"
