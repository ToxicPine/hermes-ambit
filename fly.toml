app = "hermes-joivcok6"
primary_region = "lhr"

[build]
image = "registry.fly.io/hermes-joivcok6:latest"

[http_service]
internal_port = 8080
force_https = false
auto_stop_machines = "off"
auto_start_machines = true
min_machines_running = 1

[[mounts]]
source = "hermes_data"
destination = "/data"
initial_size = "10gb"

[[vm]]
size = "shared-cpu-4x"
memory = "6gb"
